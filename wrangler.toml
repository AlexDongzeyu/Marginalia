name = "marginalia"
compatibility_date = "2025-05-05"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "./dist"

# ---------------------------------------------------------------------------
# Bindings
# ---------------------------------------------------------------------------
# D1 database — holds articles, research directions, glossary, chapters, etc.
# Create it once with:  wrangler d1 create marginalia-db
# then paste the returned database_id below.
[[d1_databases]]
binding = "DB"
database_name = "marginalia-db"
database_id = "860514d8-8abc-493f-b9f2-c17ed9a12052"

# Workers AI — used by the ingest pipeline to write plain-language explainers
# and by the on-page "Explain it simpler" assistant. No external API key needed.
[ai]
binding = "AI"

# ---------------------------------------------------------------------------
# Scheduled jobs (Cron Triggers)
# ---------------------------------------------------------------------------
# NOTE: Cron triggers run from a dedicated Worker (see /workers/cron.ts), not
# from Pages Functions. Deploy that worker separately with `wrangler deploy`.
# Pages itself cannot host cron, so the cron worker calls the same ingest
# logic and writes to the shared D1 database.

[vars]
ENVIRONMENT = "production"
# ADMIN_TOKEN is set as a SECRET (not a plaintext var), via:
#   wrangler pages secret put ADMIN_TOKEN --project-name marginalia
# It gates the /admin review actions and the manual ingest trigger.
# Until it's set, all admin actions are safely disabled.
